name: CI

# The quality gate on every push to main and every PR into main for
# @legioncodeinc/nectar. It runs the SAME recipe a developer runs locally
# (typecheck + test, where `npm test` builds first by design) so a green local
# gate predicts a green CI. This is the FIRST test CI hivenectar has ever had;
# before this, the only automated gate was the release pipeline's read-only
# gate job, which never ran on PRs.
#
# WHY THREE OPERATING SYSTEMS: hivenectar's telemetry layer writes to a local
# SQLite database via node:sqlite with POSIX-only permission enforcement
# (chmod 0o700 branches that skip on win32), and its service/registration
# code touches per-platform paths. Running the FULL suite on ubuntu + macos +
# windows exercises both sides of those platform branches; a single-OS leg
# would leave either the POSIX chmod path or the win32 skip path unproven.
#
# NODE VERSION: the engine floor is >=22. `npm test` executes the TypeScript
# test files directly under `node --test`, which relies on type stripping
# (enabled by default from Node 22.18+ on the 22 line), and passes
# `--experimental-sqlite` for node:sqlite (flagged on 22, unflagged on 24).
# `22.x` on hosted runners resolves to the latest 22 release, which satisfies
# both. The cross-OS proof is the dimension that matters, so the matrix
# spends its axes on OS, not Node majors.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Nightly run of the live Deep Lake round-trip as a HARD canary (07:30 UTC,
  # offset from honeycomb's 07:00 nightly so the two never contend for the
  # same backend at the same second). The live test otherwise never runs in
  # CI: the gate job has no credentials, so `node --test` skips it gracefully.
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch: {}

# Cancel a superseded run on the same ref (a force-push or a new commit on a
# PR) so CI minutes are not spent on a stale commit.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the gate only reads the repo and runs the build/test steps.
# No job here comments, pushes, or publishes.
permissions:
  contents: read

jobs:
  gate:
    name: hivenectar gate (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # persist-credentials: false so actions/checkout does not leave the
      # GITHUB_TOKEN in .git/config for later steps like npm ci to read
      # (zizmor artipacked hardening). This gate only reads the repo; it
      # never pushes.
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22.x'
          cache: npm

      - name: Install (npm ci)
        run: npm ci

      # Discrete steps (not one aggregate script) so a failure points at the
      # exact gate stage. hivenectar has no `npm run ci` aggregate; these are
      # its two real checks, mirroring the release pipeline's gate job.
      - name: Typecheck
        run: npm run typecheck

      # `npm test` = `npm run build && node --experimental-sqlite --test ...`
      # so the compile is exercised here too; no separate build step needed.
      - name: Test (build + node --test)
        run: npm run test

      # Packaging sanity: prove `npm pack` assembles the publishable tarball
      # without error on each OS. `--dry-run` builds the tarball in memory
      # and prints its contents; nothing is written or uploaded. `prepack`
      # (= npm run build) reruns first, which is deliberate: it is the exact
      # path `npm publish` takes on release day.
      - name: Pack sanity (npm pack --dry-run)
        run: npm pack --dry-run

  # Secret gate. The `secrets` context is NOT available in a job-level `if:`,
  # so a tiny job reads the token in a `run` step (secrets ARE allowed in
  # run/env) and emits a boolean the live job keys off. On a fork or before
  # the secrets are set, the token is empty -> `has_token=false` -> the live
  # job is SKIPPED (not failed), so the green state holds. Same pattern as
  # honeycomb's ci.yaml.
  secret-gate:
    name: Secret gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_token: ${{ steps.check.outputs.has_token }}
    steps:
      - id: check
        env:
          TOKEN: ${{ secrets.HONEYCOMB_DEEPLAKE_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

  # Real-world Deep Lake round-trip (nightly HARD canary + manual). The suite
  # contains one live test (test/source-graph-deeplake.test.ts, "live
  # round-trip") that reads `~/.deeplake/credentials.json` and skips
  # gracefully when it is absent, which is exactly what happens on every PR
  # gate leg above. THIS job materializes that credentials file from the
  # shared HONEYCOMB_DEEPLAKE_* secrets (the same four names honeycomb's live
  # jobs use, so one set of org-level secrets serves both repos) and runs the
  # suite for real against the live backend. Deliberately NOT on push/PR: the
  # deterministic gate is the merge bar; the live canary catches real-backend
  # drift nightly without ever blocking a merge.
  live-deeplake:
    name: Live Deep Lake round-trip (nightly canary)
    runs-on: ubuntu-latest
    needs: [secret-gate]
    permissions:
      contents: read
    if: >-
      ${{
        (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        && needs.secret-gate.outputs.has_token == 'true'
      }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22.x'
          cache: npm

      - name: Install (npm ci)
        run: npm ci

      # Materialize the shared credentials file the live test reads
      # (src/source-graph/deeplake-credentials.ts contract: token, orgId,
      # workspaceId required; apiUrl optional with a documented default).
      # Written 0600 under the runner's throwaway HOME; the runner VM is
      # destroyed after the job, and the values never echo to the log (the
      # JSON is assembled by node from env, never printed).
      - name: Write ~/.deeplake/credentials.json from secrets
        env:
          DEEPLAKE_ENDPOINT: ${{ secrets.HONEYCOMB_DEEPLAKE_ENDPOINT }}
          DEEPLAKE_TOKEN: ${{ secrets.HONEYCOMB_DEEPLAKE_TOKEN }}
          DEEPLAKE_ORG: ${{ secrets.HONEYCOMB_DEEPLAKE_ORG }}
          DEEPLAKE_WORKSPACE: ${{ secrets.HONEYCOMB_DEEPLAKE_WORKSPACE }}
        run: |
          mkdir -p "$HOME/.deeplake"
          node -e '
            const { writeFileSync } = require("node:fs");
            const { join } = require("node:path");
            const { homedir } = require("node:os");
            const creds = {
              ...(process.env.DEEPLAKE_ENDPOINT ? { apiUrl: process.env.DEEPLAKE_ENDPOINT } : {}),
              token: process.env.DEEPLAKE_TOKEN,
              orgId: process.env.DEEPLAKE_ORG,
              workspaceId: process.env.DEEPLAKE_WORKSPACE,
            };
            writeFileSync(join(homedir(), ".deeplake", "credentials.json"), JSON.stringify(creds), { mode: 0o600 });
            console.log("credentials.json written (contents not logged)");
          '

      # The full suite runs, and the live round-trip test now finds real
      # credentials instead of skipping. A genuine backend/wiring regression
      # honestly reds this nightly job; it never gates a merge.
      - name: Test (live round-trip enabled)
        run: npm run test
