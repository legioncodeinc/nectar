name: Tag on merge

# When a version bump merges to main, push the matching vX.Y.Z tag so release.yaml
# publishes. This is ALSO the RELEASE SAFETY NET: if a changeset reached main
# WITHOUT its bump — e.g. the PR-branch bump raced the merge, or someone bypassed
# the gate and merged early — we consume it HERE (bump on main, then tag), so a
# merged changeset ALWAYS results in a release. Without this, a raced merge left
# an orphaned changeset on main and nothing shipped.
#
# Uses RELEASE_PAT (not GITHUB_TOKEN) for every push, because (a) a GITHUB_TOKEN-
# pushed tag does NOT trigger release.yaml, and (b) the main branch ruleset grants
# repository-admin bypass, which the admin-owned PAT inherits — so the safety-net
# bump can push to protected main. Idempotent: once the changeset is consumed and
# the tag exists, a re-run finds nothing to do.

on:
  push:
    branches: [main]

concurrency:
  group: tag-on-merge
  cancel-in-progress: false

permissions:
  contents: read # all writes go through RELEASE_PAT below, not GITHUB_TOKEN

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '22.x'

      - name: Consume orphaned changeset (safety net) + tag
        env:
          GH_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${GH_PAT}" ]; then
            echo "::error::RELEASE_PAT is not set — cannot push tags/bumps that trigger release.yaml."
            exit 1
          fi
          REMOTE="https://x-access-token:${GH_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          git config user.name  "release-bot"
          git config user.email "release-bot@users.noreply.github.com"

          # SAFETY NET: a pending changeset on main means the bump never landed
          # (raced merge / bypass). Consume it here and push the bump to main.
          CHANGESET="$(ls .changeset/*.md 2>/dev/null | grep -iv 'readme.md' | head -1 || true)"
          if [ -n "$CHANGESET" ]; then
            echo "Orphaned changeset $CHANGESET found on main — applying the bump here."
            node scripts/release/apply-bump.mjs
            git commit --no-verify -m "chore(release): bump from merged changeset [safety-net]"
            git push "$REMOTE" HEAD:main
          fi

          VERSION="$(node -p "require('./package.json').version")"
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — nothing to tag."
            exit 0
          fi
          git tag -a "$TAG" -m "Release $TAG"
          git push "$REMOTE" "$TAG"
          echo "Pushed $TAG — release.yaml will publish it."
