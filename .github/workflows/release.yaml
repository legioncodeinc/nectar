name: Release

# The npm-publish workflow for @legioncodeinc/nectar. Mirrors honeycomb's
# and hivedoctor's OIDC Trusted Publishing release.yaml pattern EXACTLY
# (PRD-001c c-AC-2), adjusted only for hivenectar's actual build/test
# scripts: `build` here is a plain `tsc` (no esbuild bundling step in this
# package) and there is no aggregate `npm run ci` or `pack:check` script, so
# the gate below runs `typecheck` and `test` as discrete steps instead of
# inventing a script this package does not have. This is the FIRST release
# pipeline hivenectar has ever had; it publishes to npm under
# `@legioncodeinc` so the hive-release manifest (the-apiary PRD-001a) can pin
# a real, resolvable version of this product.
#
# JOB SPLIT (CodeRabbit review, PR #11): the pipeline is TWO jobs, not one.
# The `gate` job runs npm ci, typecheck, test, build, and every
# publishability guard under READ-ONLY permissions (contents: read), then
# hands the built `dist/` to the `publish` job as an artifact. Only the
# short `publish` job holds the publish-capable permissions, and it runs no
# repository code: no npm ci, no build scripts (`npm publish
# --ignore-scripts` skips prepack), so third-party install/build/test code
# never executes with the OIDC publish identity.
#
# AUTH: npm TRUSTED PUBLISHING (OIDC) — no NPM_TOKEN. GitHub Actions presents
# a short-lived OIDC identity (the `id-token: write` permission below) that
# npm verifies against the trusted publisher configured on the
# @legioncodeinc/nectar package (org + repo `nectar` + this workflow
# filename `release.yaml`). There is NO long-lived automation token anywhere
# in this workflow or in repo secrets. Provenance stays ON (the same OIDC
# identity signs the supply-chain attestation). Trusted Publishing REQUIRES
# npm >= 11.5.1, which Node 22 does NOT ship (it bundles npm 10.x) — see the
# "Upgrade npm" step, mandatory for OIDC to engage.
#
# BOOTSTRAP (read before the first real tag): the trusted publisher must be
# configured on npm BEFORE the first CI publish, and that configuration
# requires the package to already exist on the registry — so the FIRST
# publish of @legioncodeinc/nectar is necessarily a one-time MANUAL
# publish (2FA), exactly like honeycomb's and hivedoctor's RELEASING.md
# bootstrap. Every subsequent CI publish (from a pushed `vX.Y.Z` tag) is
# tokenless. Until that manual bootstrap + npm trusted-publisher registration
# happens, a real tag push here will fail the OIDC handshake — this is
# expected and is a human action outside the scope of this workflow file.
#
# FAILS CLOSED: the publishability preflight aborts if the version is the
# `0.0.0` not-cut-yet sentinel or if the package name is not the scoped
# `@legioncodeinc/nectar`, mirroring hivedoctor's guard. A real `npm
# publish` only happens on a tag push AND when this is not a dry run; a
# workflow_dispatch always rehearses (`npm publish --dry-run`) and defaults
# `dry_run` to true so the manual button is safe by default.
#
# Two ways in:
#   * push a version tag `vX.Y.Z` -> a real publish attempt (still gated above).
#   * workflow_dispatch with dry_run -> rehearse the whole pipeline without
#     publishing. `dry_run` defaults to TRUE.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Rehearse only: run the gate + `npm publish --dry-run`, never publish for real.'
        type: boolean
        required: false
        default: true

# Cancel a superseded manual rehearse on the same ref. Tag pushes are unique
# refs, so in practice this only coalesces repeated workflow_dispatch runs.
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Least privilege, split PER JOB (see the JOB SPLIT note above): the gate job
# is read-only; only the publish job scopes UP, and only for what a publish
# needs:
#   * contents: write  - ONLY to create the GitHub Release for the pushed tag.
#   * id-token: write  - the short-lived OIDC identity: (1) publish AUTH for
#                        npm Trusted Publishing (replaces NPM_TOKEN), and
#                        (2) npm provenance signs against it
#                        (`npm publish --provenance`). Without this scope
#                        both tokenless auth and provenance fail.

jobs:
  # ── The read-only gate: install, typecheck, test, build, and every
  # publishability guard run here, with NO publish-capable permissions. The
  # built dist/ is handed to the publish job as an artifact so the
  # privileged job never runs npm ci or the compiler. ────────────────────
  gate:
    name: Gate (checks + build)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      publish: ${{ steps.mode.outputs.publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: false

      # Dependency caching is deliberately OFF on this release pipeline
      # (cache-poisoning hardening); `npm ci` installs from the committed
      # lockfile. No `registry-url` here: the gate never authenticates to
      # npm, it only installs and builds.
      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22.x'

      - name: Install (npm ci)
        run: npm ci

      # ── The gate. hivenectar has no aggregate `npm run ci` script (unlike
      # honeycomb/hivedoctor) — run its two real checks explicitly instead of
      # inventing a script this package does not have. `npm run test` here
      # also runs `tsc` as its own prerequisite (see package.json), so the
      # explicit Build step below is a deliberate re-run for a clean,
      # just-checked-out `dist/` immediately before packaging. ─────────────
      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build (tsc)
        run: npm run build

      # ── Bake the PostHog usage-telemetry key into dist/. This MUST run
      # after the LAST build-producing step: `npm run test` above re-runs
      # `tsc` (see package.json), and so does Build (tsc), either of which
      # would overwrite a previously baked file. Every step below here only
      # inspects package.json or resolves the publish mode; the artifact
      # uploaded at the end of this job is the baked dist/, which the publish
      # job ships verbatim (--ignore-scripts, no rebuild). With the secret
      # unset (e.g. a fork), the script logs a no-op and the build stays
      # unkeyed, which hard-disables telemetry at runtime. ──────────────────
      - name: Bake PostHog key into dist
        env:
          HONEYCOMB_POSTHOG_KEY: ${{ secrets.HONEYCOMB_POSTHOG_KEY }}
          HONEYCOMB_POSTHOG_HOST: ${{ vars.HONEYCOMB_POSTHOG_HOST }}
        run: node scripts/bake-posthog-key.mjs

      # ── Tag-vs-package.json version guard. ───────────────────────────────
      - name: Guard - pushed tag matches package.json version
        if: ${{ github.ref_type == 'tag' }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json version: $PKG_VERSION"
          echo "pushed tag:           $GITHUB_REF_NAME (-> $TAG_VERSION)"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag/version mismatch: tag '$GITHUB_REF_NAME' implies version '$TAG_VERSION' but package.json is '$PKG_VERSION'. Bump package.json (npm version) and re-tag so the tag and the published artifact agree."
            exit 1
          fi
          echo "OK — tag and package.json agree on $PKG_VERSION"

      # ── Publishability preflight — FAILS CLOSED (mirrors hivedoctor). ────
      - name: Preflight — publishability (version + scoped-name guard)
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          PKG_NAME="$(node -p "require('./package.json').name")"
          echo "name:    $PKG_NAME"
          echo "version: $PKG_VERSION"
          FAIL=0
          if [ "$PKG_VERSION" = "0.0.0" ]; then
            echo "::error::package.json version is the 0.0.0 not-cut-yet sentinel. Bump it (npm version <x.y.z>) and tag v<x.y.z> to cut a real release."
            FAIL=1
          fi
          if [ "$PKG_NAME" != "@legioncodeinc/nectar" ]; then
            echo "::error::package.json name is '$PKG_NAME', expected the scoped '@legioncodeinc/nectar'."
            FAIL=1
          fi
          if [ "$FAIL" = "1" ]; then
            echo "Refusing to publish: the go-live conditions have not all been met."
            exit 1
          fi
          echo "OK — package is publishable (cut version, scoped name)."

      # ── Resolve publish mode - gated on the TRIGGER, not a token. Exported
      # as a job output so the publish job's steps condition on it. ─────────
      - name: Resolve publish mode
        id: mode
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          DRY_RUN_INPUT: ${{ github.event.inputs.dry_run }}
        run: |
          if [ "$EVENT_NAME" = "push" ] && [ "$REF_TYPE" = "tag" ] && [ "$DRY_RUN_INPUT" != "true" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Mode: REAL publish (pushed tag, not a dry run) — authenticating via OIDC Trusted Publishing."
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Mode: DRY-RUN (event=$EVENT_NAME, ref_type=$REF_TYPE, dry_run_input=$DRY_RUN_INPUT) — running npm publish --dry-run, not publishing."
          fi

      # Hand the just-built dist/ to the publish job. The tarball npm packs
      # over there is built from THIS gate's checkout; the publish job never
      # re-runs the compiler under elevated permissions.
      - name: Upload built dist (for the publish job)
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # ── The publish job: the ONLY job holding publish-capable permissions,
  # kept short and free of repository code execution. It downloads the
  # gate-built dist/ and publishes it verbatim (--ignore-scripts, so
  # prepack's rebuild is skipped and no devDependency ever installs here).
  publish:
    name: Publish nectar to npm
    runs-on: ubuntu-latest
    needs: gate
    permissions:
      contents: write
      id-token: write
    steps:
      # Checked out ONLY for the files npm packs alongside dist/
      # (package.json, README.md, LICENSE); no script from this checkout
      # runs in this job.
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: false

      # `registry-url` is REQUIRED for OIDC Trusted Publishing to engage: it
      # writes the explicit registry into the job ~/.npmrc, which is what
      # makes npm enter the npmjs auth path. setup-node ALSO scaffolds a
      # DUMMY `_authToken`; the next step strips JUST that line so npm stays
      # OIDC-capable AND credential-free.
      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      # Node 22 bundles npm 10.x, but npm Trusted Publishing (OIDC) requires
      # npm >= 11.5.1. Upgrade BEFORE the publish so every npm invocation in
      # this job is OIDC-capable. Pinned to an exact version (must stay
      # >= 11.5.1); bump deliberately.
      - name: Upgrade npm (Trusted Publishing needs npm >= 11.5.1)
        run: npm install -g npm@11.6.2

      # Strip setup-node's dummy `_authToken` line so OIDC Trusted Publishing
      # authenticates the publish (npm uses OIDC only when NO credential is
      # configured). The registry line is KEPT.
      - name: Enable OIDC trusted publishing (strip scaffolded auth token)
        run: |
          npmrc="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          if [ -f "$npmrc" ]; then
            sed -i '/:_authToken=/d' "$npmrc"
          fi
          echo "npm version: $(npm --version)"
          echo "registry:    $(npm config get registry)"
          echo "----- effective .npmrc ($npmrc) -----"
          sed -E 's/(_authToken=).*/\1<redacted>/' "$npmrc" 2>/dev/null || echo "(no .npmrc)"

      # The dist/ the read-only gate built and verified. This is what the
      # tarball ships.
      - name: Download built dist (from the gate job)
        uses: actions/download-artifact@v8.0.1
        with:
          name: dist
          path: dist

      # Idempotency guard so a rerun after a partial failure (published but
      # the GitHub Release step failed) does not die trying to republish the
      # same version. Fail-closed: only a genuine 404 sets exists=false.
      - name: Check whether this version is already on npm
        id: npm_version
        if: ${{ needs.gate.outputs.publish == 'true' }}
        run: |
          PKG_NAME="$(node -p "require('./package.json').name")"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          set +e
          VIEW_OUTPUT="$(npm view "$PKG_NAME@$PKG_VERSION" version --json 2>&1)"
          STATUS=$?
          set -e
          if [ "$STATUS" -eq 0 ]; then
            echo "Already on the registry: $PKG_NAME@$PKG_VERSION. Skipping the upload; the rerun will go straight to the GitHub Release."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          elif echo "$VIEW_OUTPUT" | grep -q 'E404'; then
            echo "Not yet on the registry: $PKG_NAME@$PKG_VERSION. Will publish."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            echo "::error::\`npm view $PKG_NAME@$PKG_VERSION\` failed with a non-404 error; refusing to guess the publish state. Output below."
            echo "$VIEW_OUTPUT"
            exit "$STATUS"
          fi

      # ── Publish. `--ignore-scripts` skips prepack (= npm run build): this
      # job has no node_modules and MUST NOT rebuild; it packs the gate-built
      # dist/ downloaded above. Auth is TOKENLESS via OIDC (npm >= 11.5.1,
      # ensured above).
      - name: Publish (real)
        if: ${{ needs.gate.outputs.publish == 'true' && steps.npm_version.outputs.exists != 'true' }}
        run: npm publish --provenance --access public --ignore-scripts

      # Rehearse: same command minus the real upload. Runs whenever we are
      # NOT in real-publish mode so the pipeline is exercised end-to-end and
      # stays green. `--dry-run` does no OIDC handshake and no upload.
      - name: Publish (dry-run rehearsal)
        if: ${{ needs.gate.outputs.publish != 'true' }}
        run: npm publish --provenance --access public --ignore-scripts --dry-run

      # ── GitHub Release. Only on a real tag push AND only after a real
      # publish (or the idempotent rerun path). ────────────────────────────
      - name: Create GitHub Release
        if: ${{ github.ref_type == 'tag' && needs.gate.outputs.publish == 'true' }}
        uses: softprops/action-gh-release@v2.4.1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
